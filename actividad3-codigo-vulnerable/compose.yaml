# ACTIVIDAD 3 - COMPOSE VULNERABLE DE LABORATORIO
# Este fichero se usa solo para explicar configuraciones inseguras detectables por herramientas.

version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
    ports:
      - "3000:3000"
    # Riesgo: permisos excesivos dentro del contenedor.
    privileged: true
    environment:
      # Riesgo: credenciales débiles y visibles en configuración.
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: todo
    depends_on:
      - db

  db:
    image: mysql:8
    # Riesgo: exposición directa de MySQL al host.
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: todo
    volumes:
      - mysql-data-vulnerable:/var/lib/mysql

volumes:
  mysql-data-vulnerable:
